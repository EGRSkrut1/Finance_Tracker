<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>F1n4lyBr0k3.finance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/landing-overlay.css">
</head>
<body>

  <div class="landing">
    <!-- ФОН: вторая картинка -->
    <img
      src="images/Slide_16_9_-_1_2.png"
      alt=""
      class="landing__bg"
      draggable="false"
    >

    <!-- ОБЛАСТЬ 1: кнопка (синий круг в hero) -->
    <a href="#registration" class="overlay overlay--cta">
      перейти к регистрации
    </a>

    <!-- ОБЛАСТЬ 2: форма регистрации (синий круг в join the club) -->
    <section id="registration" class="overlay overlay--form">
      <form class="registration-form" onsubmit="event.preventDefault(); register();">
        <label class="form-label" for="reg-username">имя пользователя</label>
        <input type="text" id="reg-username" placeholder="username" autocomplete="username" required>

        <label class="form-label" for="reg-email">email</label>
        <input type="email" id="reg-email" placeholder="you@mail.com" autocomplete="email" required>

        <label class="form-label" for="reg-password">пароль</label>
        <input type="password" id="reg-password" placeholder="••••••••" autocomplete="new-password" required>

        <button type="submit" class="btn-submit">вступить в клуб</button>
        <p id="register-error" class="form-error" aria-live="polite"></p>
      </form>
    </section>

    <!-- ОБЛАСТЬ 3: подвал (синий круг внизу) -->
    <footer class="overlay overlay--footer">
      <div class="footer-left">
        <p class="footer-brand">F1n4lyBr0k3.finance</p>
        <p class="footer-copy">© 2026 — все права и все долги зарезервированы</p>
      </div>
      <div class="footer-right">
        <nav class="footer-nav">
          <a href="#">политика приватности</a>
          <a href="#">условия использования</a>
          <a href="mailto:support@f1n4lybr0k3.finance">support@f1n4lybr0k3.finance</a>
        </nav>
        <p class="footer-tagline">мы не храним ваши банковские данные. мы храним только правду.</p>
      </div>
    </footer>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
